<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Cithara{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #0a0a0f; color: #e5e7eb; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
    .navbar { background-color: #111827; border-bottom: 1px solid #1f2937; }
    .navbar-brand { color: #a78bfa !important; font-weight: 700; font-size: 1.4rem; letter-spacing: -0.5px; }
    .btn-purple { background-color: #7c3aed; border: none; color: #fff; }
    .btn-purple:hover { background-color: #6d28d9; color: #fff; }
    .card { background-color: #111827; border: 1px solid #1f2937; color: #e5e7eb; border-radius: 12px; }
    .form-control, .form-select {
      background-color: #1f2937; border: 1px solid #374151; color: #e5e7eb;
    }
    .form-control:focus, .form-select:focus {
      background-color: #1f2937; border-color: #7c3aed; color: #e5e7eb;
      box-shadow: 0 0 0 0.2rem rgba(124,58,237,.25);
    }
    .form-control::placeholder { color: #6b7280; }
    .form-select option { background-color: #1f2937; }
    .badge-status-pending    { background-color: #374151; color: #9ca3af; }
    .badge-status-processing { background-color: #1e3a5f; color: #60a5fa; }
    .badge-status-completed  { background-color: #064e3b; color: #34d399; }
    .badge-status-failed     { background-color: #7f1d1d; color: #f87171; }
    audio { accent-color: #7c3aed; }
    a { color: #a78bfa; }
    a:hover { color: #c4b5fd; }
    .text-purple { color: #a78bfa; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark px-4 py-3">
    <a class="navbar-brand" href="/">♪ Cithara</a>
    <div class="d-flex gap-2">
      <a href="/create/" class="btn btn-purple btn-sm px-3">+ Create</a>
      <a href="/library/" class="btn btn-outline-secondary btn-sm px-3">Library</a>
    </div>
  </nav>

  <main class="container py-5">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
